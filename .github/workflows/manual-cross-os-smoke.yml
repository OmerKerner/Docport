name: Manual Cross-OS Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    name: smoke-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Quick unit smoke
        run: npx vitest run tests/unit/manifest.test.ts tests/unit/OoxmlEquationParser.test.ts

      - name: Quick integration smoke
        run: npx vitest run tests/integration/manifest-workflow.test.ts tests/integration/roundtrip-md-docx-md-mixed.test.ts
